name: CI - DY Patil Carbon Dashboard

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-backend:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    - name: Run API Tests
      run: |
        # We use mock DB URL for CI testing if real one isn't provided
        export DATABASE_URL="sqlite:///./test.db"
        # Since we're in root, we need to handle paths
        export PYTHONPATH=$PYTHONPATH:.
        # Just check if files are valid and imports work for now
        python -c "import backend.main; print('Backend Imports OK')"

  test-frontend:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: frontend/package.json
    - name: Install Dependencies
      run: |
        cd frontend
        npm install
    - name: Build
      run: |
        cd frontend
        npm run build
